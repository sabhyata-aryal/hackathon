<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload Successful</title>
    <style>
        :root {
            --bg: #f2f7ff;
            --card: #ffffff;
            --primary: #0e4ec5;
            --text: #1a223a;
            --border: #d8e2fc;
            --success: #2f9d46;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #ebf2ff, #f7fbff);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            width: min(560px, 100%);
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 14px 32px rgba(33, 56, 105, 0.13);
            padding: 28px;
            text-align: center;
        }

        h2 {
            margin: 0;
            font-size: clamp(1.5rem, 2vw, 2rem);
            color: var(--success);
            margin-bottom: 12px;
        }

        p {
            margin: 0 0 20px;
            color: #4d5f8f;
            font-size: 1rem;
        }

        .link-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
            color: #fff;
            background: var(--primary);
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-weight: 600;
            transition: background-color 0.15s ease, transform 0.1s ease;
        }

        .link-btn:hover {
            background: #0c3eaa;
            transform: translateY(-1px);
        }

        .details {
            margin-top: 15px;
            color: #8693b8;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="card">
        <h2>Report Uploaded Successfully!</h2>
        <p>Your file is now in the queue for plagiarism checking. You will be redirected shortly.</p>
        <a class="link-btn" href="/upload/">Upload Another Report</a>
        <p class="details">If you are not redirected automatically, click the button above.</p>
    </div>

    <script>
        setTimeout(() => {
            window.location.href = '/upload/';
        }, 7000);
    </script>
</body>

</html>
